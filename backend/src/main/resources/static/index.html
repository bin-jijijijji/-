<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>智能安防系统（毕业论文原型）</title>
  <style>
    body { font-family: Arial, "Microsoft YaHei", sans-serif; margin: 16px; }
    .row { display: flex; gap: 16px; flex-wrap: wrap; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; }
    .card h3 { margin: 0 0 8px; font-size: 16px; }
    .muted { color: #666; font-size: 12px; }
    video { background: #000; max-width: 100%; }
    #videoGrid video { width: 240px; height: 135px; object-fit: cover; }
    #roiWrap { position: relative; width: 640px; max-width: 100%; }
    #roiCanvas { position: absolute; left: 0; top: 0; }
    #alarmList { max-height: 360px; overflow: auto; }
    .alarm { border-bottom: 1px solid #eee; padding: 8px 0; }
    .alarm img { width: 120px; height: 80px; object-fit: cover; }
    button { padding: 6px 10px; cursor: pointer; }
    input, select { padding: 6px; }
    #loginPanel { max-width: 420px; margin: 20px auto; }
  </style>
</head>
<body>

<div id="loginPanel" class="card">
  <h3>登录</h3>
  <div style="margin-bottom: 8px;">
    <label>用户名：</label>
    <input id="loginUsername" value="admin" />
  </div>
  <div style="margin-bottom: 8px;">
    <label>密码：</label>
    <input id="loginPassword" type="password" value="admin123" />
  </div>
  <button onclick="App.login()">登录</button>
  <div id="loginMsg" class="muted" style="margin-top: 8px;"></div>
</div>

<div id="appPanel" style="display:none;">
  <div class="row" style="align-items:flex-start;">
    <div class="card" style="flex: 1 1 420px;">
      <h3>视频网格（多摄像头/多路回放）</h3>
      <div class="muted">点击某一路，进入右侧 ROI 识别配置。</div>
      <div id="videoGrid" style="margin-top: 10px;"></div>

      <div style="margin-top: 14px; border-top: 1px solid #eee; padding-top: 12px;">
        <h3 style="margin:0 0 8px;">视频上传（管理员）</h3>
        <div class="muted">上传后系统会自动生成对应 `camera` 与 `video_asset`。</div>
        <div style="margin-top: 8px;">
          <label>摄像头名称：</label>
          <input id="videoCameraName" value="Camera-1" />
        </div>
        <div style="margin-top: 8px;">
          <label>视频标题：</label>
          <input id="videoTitle" value="Demo-Video" />
        </div>
        <div style="margin-top: 8px;">
          <label>选择视频：</label>
          <input id="videoFileInput" type="file" accept="video/*" />
        </div>
        <div style="margin-top: 8px;">
          <button onclick="App.uploadVideoAsset()">上传视频</button>
        </div>
        <div id="videoUploadMsg" class="muted" style="margin-top: 6px;"></div>
      </div>
    </div>

    <div class="card" style="flex: 1 1 520px;">
      <h3>ROI 矩形标注与识别配置</h3>
      <div style="margin-bottom: 8px;">
        <div class="muted">当前视频：</div>
        <div id="currentVideoTitle" style="font-weight:600;"></div>
      </div>

      <div id="roiWrap">
        <video id="mainVideo" controls preload="metadata"></video>
        <canvas id="roiCanvas"></canvas>
      </div>

      <div style="margin-top: 10px;">
        <div class="muted">提示：拖拽绘制 ROI 矩形，松开鼠标后点击“保存ROI”。</div>
        <div style="margin-top: 8px;">
          <label>ROI名称：</label>
          <input id="roiName" value="ROI-1" />
        </div>
        <div style="margin-top: 8px;">
          <label>相似度阈值：</label>
          <input id="threshold" type="number" step="0.01" value="0.12" />
        </div>
        <div style="margin-top: 8px;">
          <label>选择ROI：</label>
          <select id="roiSelect"></select>
        </div>
        <div style="margin-top: 8px; display:flex; gap:10px;">
          <button onclick="App.saveRoi()">保存ROI</button>
          <button onclick="App.startJob()">开始识别</button>
        </div>
      </div>
    </div>

    <div class="card" style="flex: 1 1 420px;">
      <h3>告警提醒（实时）</h3>
      <div id="alarmList"></div>

      <div style="height: 16px;"></div>
      <h3>人员样本上传（管理员）</h3>
      <div class="muted">用于生成黑/白名单 embedding。</div>
      <div style="margin-top: 10px;">
        <label>姓名：</label>
        <input id="idName" />
      </div>
      <div style="margin-top: 10px;">
        <label>类型：</label>
        <select id="idListType">
          <option value="blacklist">blacklist</option>
          <option value="whitelist">whitelist</option>
        </select>
      </div>
      <div style="margin-top: 10px;">
        <label>图片：</label>
        <input id="idImages" type="file" multiple accept="image/*" />
      </div>
      <div style="margin-top: 10px;">
        <button onclick="App.uploadIdentity()">上传样本</button>
      </div>
      <div id="identityMsg" class="muted" style="margin-top: 8px;"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@6.1.2/umd/stomp.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
